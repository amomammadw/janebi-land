<!doctype html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>جانبی لند - {{ product.title }}</title>
  </head>
  <body>
    <h1>{{ product.title }}</h1>
    {% if product.description %}
    <p>{{ product.description }}</p>
    {% endif %}
    <p>قیمت: {{ product.price }} تومان</p>
    {% if product.discount %}
    <p>تخفیف: {{ product.discount }}٪</p>
    {% endif %} {% if product.has_loan %}
    <p>امکان خرید اقساطی</p>
    {% endif %}
    <p><a href="{% url 'product-list' %}">بازگشت به لیست محصولات</a></p>
  </body>
</html>
