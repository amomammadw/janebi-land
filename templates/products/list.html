{% extends "base.html" %}

{% block title %}محصولات — جانبی لند{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-12">
  <h1 class="text-2xl font-bold mb-8">محصولات</h1>

  {% if products %}
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
    {% for product in products %}
    {% include "partials/product_card.html" %}
    {% endfor %}
  </div>
  {% else %}
  <p class="text-center text-gray-500 py-12">محصولی یافت نشد.</p>
  {% endif %}
</div>
{% endblock %}
