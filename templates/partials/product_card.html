<article class="bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
  <a href="{% url 'product-detail' slug=product.slug %}">
    {% if product.image %}
    <img
      src="{{ product.image.url }}"
      alt="{{ product.title }}"
      class="w-full h-48 object-cover"
    />
    {% else %}
    <div class="w-full h-48 product-image-placeholder flex items-center justify-center">
      <svg class="w-12 h-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
        />
      </svg>
    </div>
    {% endif %}
    <div class="p-4">
      <h3 class="font-medium text-sm mb-2 line-clamp-2">{{ product.title }}</h3>
      <div class="flex items-center justify-between">
        <span class="text-blue-600 font-bold text-sm">{{ product.price }} تومان</span>
        {% if product.discount %}
        <span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">{{ product.discount }}٪ تخفیف</span>
        {% endif %}
      </div>
      {% if product.has_loan %}
      <span class="inline-block mt-2 text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">اقساطی</span>
      {% endif %}
    </div>
  </a>
</article>
