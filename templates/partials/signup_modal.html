<div id="signup-modal" class="modal-overlay">
  <div class="modal-content">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold">ورود / ثبت‌نام</h2>
      <button id="signup-close-btn" class="text-gray-400 hover:text-gray-600 text-xl leading-none">
        &times;
      </button>
    </div>

    <div id="otp-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2 mb-4"></div>

    <div id="otp-step-phone">
      <p class="text-sm text-gray-600 mb-4">شماره موبایل خود را وارد کنید.</p>
      <input
        id="otp-phone"
        type="tel"
        class="form-input mb-4"
        placeholder="۰۹۱۲۳۴۵۶۷۸۹"
        dir="ltr"
        maxlength="11"
      />
      <button
        id="otp-send-btn"
        class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition-colors"
      >
        دریافت کد تأیید
      </button>
    </div>

    <div id="otp-step-code" class="hidden">
      <p class="text-sm text-gray-600 mb-4">
        کد ارسال‌شده به <span id="otp-phone-display" class="font-medium" dir="ltr"></span> را وارد کنید.
      </p>
      <input
        id="otp-code"
        type="text"
        class="form-input mb-4 text-center tracking-widest"
        placeholder="------"
        dir="ltr"
        maxlength="6"
      />
      <button
        id="otp-verify-btn"
        class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition-colors mb-2"
      >
        تأیید و ورود
      </button>
      <button id="otp-back-btn" class="w-full text-sm text-gray-500 hover:text-gray-700 py-2">
        تغییر شماره موبایل
      </button>
    </div>
  </div>
</div>
